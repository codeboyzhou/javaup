name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache-dependency-path: |
            go.sum
            golangci-lint.sum
            govulncheck.sum

      - name: Validate release tag
        shell: bash
        run: |
          if [[ ! "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid release tag: ${GITHUB_REF_NAME}"
            exit 1
          fi

      - name: Verify
        run: go run build.go verify

  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    needs: verify
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
          - goos: windows
            goarch: arm64

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: true

      - name: Build and package
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          set -euo pipefail

          version="${GITHUB_REF_NAME}"
          package_name="javaup-${version#v}-${GOOS}-${GOARCH}"
          binary_name="jup"

          if [[ "${GOOS}" == "windows" ]]; then
            binary_name="jup.exe"
          fi

          mkdir -p "package/${package_name}" dist

          go build \
            -trimpath \
            -ldflags="-s -w -X github.com/codeboyzhou/javaup/internal/buildinfo.Version=${version} -X github.com/codeboyzhou/javaup/internal/buildinfo.Commit=${GITHUB_SHA}" \
            -o "package/${package_name}/${binary_name}" \
            ./cmd/jup

          cp LICENSE README.md README.zh-CN.md "package/${package_name}/"

          if [[ "${GOOS}" == "windows" ]]; then
            (
              cd package
              zip -qr "../dist/${package_name}.zip" "${package_name}"
            )
          else
            tar \
              -C package \
              -czf "dist/${package_name}.tar.gz" \
              "${package_name}"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: release-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*
          if-no-files-found: error
          retention-days: 7

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: release-*
          path: dist
          merge-multiple: true

      - name: Stage installer
        run: cp install.ps1 install.sh dist/

      - name: Generate checksums
        shell: bash
        run: |
          cd dist
          sha256sum * > checksums.txt

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            dist/* \
            --verify-tag \
            --generate-notes \
            --title "javaup ${GITHUB_REF_NAME}"
