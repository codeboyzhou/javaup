name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  SOURCE_DATE_EPOCH: "0"

jobs:
  quality:
    name: format, lint, and docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install the minimum supported Rust toolchain
        run: rustup toolchain install 1.89.0 --profile minimal --component clippy,rustfmt
      - name: Check formatting
        run: cargo +1.89.0 fmt --all -- --check
      - name: Run Clippy
        run: cargo +1.89.0 clippy --workspace --all-targets --all-features --locked -- -D warnings
      - name: Build documentation
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo +1.89.0 doc --workspace --all-features --no-deps --locked

  test:
    name: test (${{ matrix.os }}, ${{ matrix.toolchain }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            toolchain: 1.89.0
          - os: ubuntu-latest
            toolchain: stable
          - os: windows-latest
            toolchain: stable
          - os: macos-latest
            toolchain: stable
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        run: rustup toolchain install ${{ matrix.toolchain }} --profile minimal
      - name: Run all tests
        run: cargo +${{ matrix.toolchain }} test --workspace --all-targets --all-features --locked

  coverage:
    name: coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust coverage support
        run: rustup toolchain install stable --profile minimal --component llvm-tools-preview
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      - name: Report workspace coverage
        run: cargo +stable llvm-cov --workspace --all-features --locked --summary-only
